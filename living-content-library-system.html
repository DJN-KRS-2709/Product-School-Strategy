<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product School — Living Content Library System</title>
<style>
  :root {
    --bg: #06080f;
    --surface-solid: #0f172a;
    --border: rgba(51, 65, 85, 0.5);
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --text-dim: #475569;
    --cyan: #22d3ee;
    --blue: #3b82f6;
    --emerald: #34d399;
    --amber: #fbbf24;
    --violet: #a78bfa;
    --orange: #fb923c;
    --pink: #f472b6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    text-align: center;
    padding: 20px 24px 8px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  header h1 span {
    background: linear-gradient(135deg, var(--cyan), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header p {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
  }
  .canvas-wrap {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  canvas#flowCanvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .detail-panel {
    position: fixed;
    right: -400px;
    top: 0;
    width: 380px;
    height: 100vh;
    background: var(--surface-solid);
    border-left: 1px solid var(--border);
    z-index: 200;
    transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 32px 24px;
    overflow-y: auto;
  }
  .detail-panel.open { right: 0; }
  .detail-panel .close-btn {
    position: absolute; top: 16px; right: 16px;
    background: none; border: 1px solid var(--border);
    color: var(--text-muted); width: 32px; height: 32px;
    border-radius: 8px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .detail-panel .close-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .detail-panel .dp-category { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  .detail-panel .dp-title { font-size: 20px; font-weight: 700; margin-bottom: 12px; line-height: 1.3; }
  .detail-panel .dp-desc { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 20px; }
  .detail-panel .dp-meta { display: flex; gap: 12px; flex-wrap: wrap; }
  .detail-panel .dp-tag { font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .hover-tip {
    position: fixed;
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid rgba(59, 130, 246, 0.4);
    border-radius: 8px; padding: 8px 12px;
    font-size: 12px; font-weight: 600; color: var(--text);
    pointer-events: none; z-index: 150; display: none;
    backdrop-filter: blur(8px); white-space: nowrap;
  }
  .hover-tip.visible { display: block; }
  .hover-tip .ht-sub { font-size: 10px; font-weight: 400; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
<header>
  <h1>Product School <span>Living Content Library</span></h1>
  <p>Click any node to explore details. Watch the data flow.</p>
</header>
<div class="canvas-wrap"><canvas id="flowCanvas"></canvas></div>
<div class="detail-panel" id="detailPanel">
  <button class="close-btn" id="closePanel">&times;</button>
  <div class="dp-category" id="dpCategory"></div>
  <div class="dp-title" id="dpTitle"></div>
  <div class="dp-desc" id="dpDesc"></div>
  <div class="dp-meta" id="dpMeta"></div>
</div>
<div class="hover-tip" id="hoverTip"><div id="htLabel"></div><div class="ht-sub" id="htSub"></div></div>

<script>
const canvas = document.getElementById('flowCanvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;
let hoveredNode = null;

const C = {
  cyan: '#22d3ee', violet: '#a78bfa', blue: '#3b82f6',
  emerald: '#34d399', orange: '#fb923c', pink: '#f472b6', amber: '#fbbf24',
};

function hexToRgb(hex) {
  return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;
}

const sources = [
  { id:'s1', label:'Student Surveys', sub:'~50 batches/yr', color:C.cyan, group:'internal',
    desc:'Post-cohort satisfaction data, per-module ratings, and free-text feedback from every certification. In the library model, this signal enriches atoms across all 9 courses.', tags:['Internal','High Volume'] },
  { id:'s2', label:'Customer Success', sub:'High signal', color:C.cyan, group:'internal',
    desc:'Recurring questions, confusion points, topic requests from CS conversations. The closest proxy for what enterprise customers want next.', tags:['Internal','Enterprise Signal'] },
  { id:'s3', label:'Instructor Observations', sub:'Per cohort', color:C.cyan, group:'internal',
    desc:'In-class adaptations, questions revealing confusion, concepts that land well. Low volume but highest practical value for teaching notes.', tags:['Internal','Teaching Quality'] },
  { id:'s4', label:'Enterprise Demand', sub:'Revenue signal', color:C.cyan, group:'internal',
    desc:'What enterprise customers request in custom programs, which topics they prioritize. Each request carries budget authority.', tags:['Internal','Revenue'] },
  { id:'s5', label:'Cohort Transcripts', sub:'240+ sessions/yr', color:C.cyan, group:'internal',
    desc:'AI-transcribed class sessions. AI-assisted extraction surfaces new questions, concepts needing extra explanation, and student-contributed insights.', tags:['Internal','AI-Assisted'] },
  { id:'s6', label:"Lenny's Newsletter & Podcast", sub:'2-4/month', color:C.violet, group:'external',
    desc:"PM-focused analysis on AI products, pricing, evals, adoption. Highest-signal external source. Already proven with lenny-insights.md mapping 10+ sources to modules.", tags:['External','Highest Signal'] },
  { id:'s7', label:'Product School Events', sub:'Proprietary', color:C.violet, group:'external',
    desc:"Keynotes, panels, workshops from Product School's own conferences. Proprietary content no competitor can access.", tags:['External','Proprietary'] },
  { id:'s8', label:'LinkedIn & Social', sub:'3-5/week', color:C.violet, group:'external',
    desc:'High-engagement posts from PM and AI thought leaders. Surfaces trends 2-4 weeks before newsletters.', tags:['External','Trend Detection'] },
  { id:'s9', label:'Substack & Blogs', sub:'2-3/week', color:C.violet, group:'external',
    desc:'Long-form analysis from Stratechery, Pragmatic Engineer, and AI-focused PM publications. Higher quality, lower frequency.', tags:['External','Deep Analysis'] },
  { id:'s10', label:'Reddit & Communities', sub:'1-2/week', color:C.violet, group:'external',
    desc:'r/ProductManagement, r/artificial. Practitioner discussions, real-world challenges, failure stories that polished publications miss.', tags:['External','Practitioner Signal'] },
];

const libAtoms = [
  { id:'l1', label:'Concepts', sub:'Canonical definitions', color:C.blue,
    desc:"Named ideas with canonical definitions. Examples: 'Deterministic vs. Probabilistic Software', 'Trust \u2260 Accuracy', 'Comprehension Debt'. One canonical definition; courses adapt depth, not definition.", tags:['Atom Type','120+ identified'] },
  { id:'l2', label:'Frameworks', sub:'Reusable models', color:C.blue,
    desc:"Reusable mental models with structure and scoring. Examples: '5 AI Value Archetypes', 'Agent Spectrum', 'Data Flywheel', 'Eval Stack', '8 Moats'.", tags:['Atom Type','Cross-course'] },
  { id:'l3', label:'Evidence', sub:'Case studies & stats', color:C.blue,
    desc:"Case studies, data points, statistics with source attribution and recency metadata. Examples: 'Klarna Automator overcorrection', 'Jasper vs. ChatGPT encroachment'.", tags:['Atom Type','Source-verified'] },
  { id:'l4', label:'Signals', sub:'Emerging insights', color:C.blue,
    desc:"Raw or lightly processed external inputs with extracted insights. Processed through quality gates (Relevance, Novelty, Credibility, Actionability) before course use.", tags:['Atom Type','Quality-gated'] },
];

const outputs = [
  { id:'o1', label:'9 Certifications', sub:'Always current', color:C.emerald, group:'certifications',
    desc:'All nine certifications draw from the shared library. When an atom is updated, every referencing course gets fresher content automatically.', tags:['Courses','9 Programs'] },
  { id:'o2', label:'Enterprise Workshops', sub:'Custom composition', color:C.orange, group:'enterprise',
    desc:'Personalized programs composed from library atoms. Tailored to client industry, role level, and strategic priorities.', tags:['Enterprise','Revenue Driver'] },
  { id:'o3', label:'Enterprise Presentations', sub:'Source-attributed', color:C.orange, group:'enterprise',
    desc:'Board-ready materials, executive briefings, custom decks. Every claim source-attributed, every stat freshness-dated.', tags:['Enterprise','Board-Ready'] },
  { id:'o4', label:"Carlos's Podcast", sub:'Always fresh', color:C.pink, group:'thought-leadership',
    desc:"Talking points, frameworks, provocative takes sourced from the library for Carlos's podcast and guest appearances.", tags:['Thought Leadership','CEO Voice'] },
  { id:'o5', label:'Blog Posts & Articles', sub:'Brand authority', color:C.pink, group:'thought-leadership',
    desc:'Long-form thought leadership built from validated atoms. Same rigor as the certifications.', tags:['Thought Leadership','Content Marketing'] },
  { id:'o6', label:'LinkedIn & Social', sub:'Engagement driver', color:C.pink, group:'thought-leadership',
    desc:'Frameworks, stats, and provocations formatted for social. Drives engagement and funnels to certifications and enterprise.', tags:['Thought Leadership','Social'] },
  { id:'o7', label:'Speaker Materials', sub:'Consistent voice', color:C.pink, group:'thought-leadership',
    desc:'Conference talks, keynote decks, panel prep. All speakers pull from the same verified library.', tags:['Thought Leadership','Events'] },
  { id:'o8', label:'Newsletter & Email', sub:'Community', color:C.pink, group:'thought-leadership',
    desc:'Community updates with latest frameworks and insights. Never conflicts with what is taught in class.', tags:['Thought Leadership','Community'] },
];

// Layout
let allNodes = [];
let layout = {};

function resize() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  computeLayout();
}

function computeLayout() {
  const margin = 14;
  const srcColX = margin;
  const srcColW = W * 0.14;
  const outColX = W - margin - W * 0.155;
  const outColW = W * 0.155;
  const libLeft = srcColX + srcColW + 30;
  const libRight = outColX - 30;
  const libCX = (libLeft + libRight) / 2;
  const libW = libRight - libLeft;

  const topY = 10;
  const botY = H - 30;
  const usableH = botY - topY;

  // Source nodes — sized by node count with compact spacing
  const internalSrcs = sources.filter(s => s.group === 'internal');
  const externalSrcs = sources.filter(s => s.group === 'external');
  const nodeRowH = Math.min(36, usableH * 0.065);
  const framePadTop = 24;
  const framePadBot = 8;
  const srcGap = 12;

  const intH = internalSrcs.length * nodeRowH + framePadTop + framePadBot;
  const extH = externalSrcs.length * nodeRowH + framePadTop + framePadBot;
  const srcTotalH = intH + srcGap + extH;
  const srcOffsetY = topY + (usableH - srcTotalH) / 2;
  const intTop = srcOffsetY;
  const extTop = intTop + intH + srcGap;

  const srcNodeX = srcColX + srcColW - 12;

  allNodes = [];

  internalSrcs.forEach((s, i) => {
    const y = intTop + framePadTop + nodeRowH * i + nodeRowH / 2;
    allNodes.push({ ...s, x: srcNodeX, y, r: 6, type: 'source' });
  });
  externalSrcs.forEach((s, i) => {
    const y = extTop + framePadTop + nodeRowH * i + nodeRowH / 2;
    allNodes.push({ ...s, x: srcNodeX, y, r: 6, type: 'source' });
  });

  // Library nodes — arranged horizontally along the trunk line
  const libMidY = (topY + botY) / 2;
  const libInnerLeft = libLeft + 50;
  const libInnerRight = libRight - 50;
  const libNodeSpacing = (libInnerRight - libInnerLeft) / (libAtoms.length - 1);

  libAtoms.forEach((l, i) => {
    allNodes.push({ ...l, x: libInnerLeft + i * libNodeSpacing, y: libMidY, r: 10, type: 'library' });
  });

  // Output nodes — sized by node count with compact spacing
  const certOuts = outputs.filter(o => o.group === 'certifications');
  const entOuts = outputs.filter(o => o.group === 'enterprise');
  const tlOuts = outputs.filter(o => o.group === 'thought-leadership');
  const outNodeX = outColX + 12;
  const outGap = 12;

  const certH = certOuts.length * nodeRowH + framePadTop + framePadBot;
  const entH = entOuts.length * nodeRowH + framePadTop + framePadBot;
  const tlH = tlOuts.length * nodeRowH + framePadTop + framePadBot;
  const outTotalH = certH + outGap + entH + outGap + tlH;
  const outOffsetY = topY + (usableH - outTotalH) / 2;
  const certTop = outOffsetY;
  const entTop = certTop + certH + outGap;
  const tlTop = entTop + entH + outGap;

  certOuts.forEach((o, i) => {
    const y = certTop + framePadTop + nodeRowH * i + nodeRowH / 2;
    allNodes.push({ ...o, x: outNodeX, y, r: 6, type: 'output' });
  });
  entOuts.forEach((o, i) => {
    const y = entTop + framePadTop + nodeRowH * i + nodeRowH / 2;
    allNodes.push({ ...o, x: outNodeX, y, r: 6, type: 'output' });
  });
  tlOuts.forEach((o, i) => {
    const y = tlTop + framePadTop + nodeRowH * i + nodeRowH / 2;
    allNodes.push({ ...o, x: outNodeX, y, r: 6, type: 'output' });
  });

  // Store layout info for drawing frames and trunks
  const libFrameTop = libMidY - 86;
  const libFrameBot = libMidY + 70;
  const atomXPositions = libAtoms.map((_, i) => libInnerLeft + i * libNodeSpacing);
  layout = {
    srcColX, srcColW, outColX, outColW,
    libLeft, libRight, libCX, libW,
    libFrameTop, libFrameBot, libMidY,
    atomXPositions,
    topY, botY,
    srcNodeX, outNodeX,
    intTop, intBot: intTop + intH,
    extTop, extBot: extTop + extH,
    certTop, certBot: certTop + certH,
    entTop, entBot: entTop + entH,
    tlTop, tlBot: tlTop + tlH,
    trunkInX: libLeft,
    trunkOutX: libRight,
    trunkMidY: libMidY,
  };

  initParticles();
}

// Particles
let inTrunkParticles = [];
let outTrunkParticles = [];
let feedbackParticles = [];
let sourceLineParticles = [];
let outputLineParticles = [];

function initParticles() {
  const srcNodes = allNodes.filter(n => n.type === 'source');
  const outNodes = allNodes.filter(n => n.type === 'output');

  sourceLineParticles = srcNodes.map(() => ({
    t: Math.random(),
    speed: 0.0003 + Math.random() * 0.0003,
    size: 1.5 + Math.random(),
    alpha: 0.5 + Math.random() * 0.3,
  }));

  inTrunkParticles = [];
  for (let i = 0; i < 4; i++) {
    inTrunkParticles.push({
      t: i / 4,
      speed: 0.0004 + Math.random() * 0.0003,
      size: 2.5 + Math.random(),
      alpha: 0.5 + Math.random() * 0.4,
    });
  }

  outTrunkParticles = [];
  for (let i = 0; i < 4; i++) {
    outTrunkParticles.push({
      t: i / 4,
      speed: 0.0004 + Math.random() * 0.0003,
      size: 2.5 + Math.random(),
      alpha: 0.5 + Math.random() * 0.4,
    });
  }

  outputLineParticles = outNodes.map(() => ({
    t: Math.random(),
    speed: 0.0003 + Math.random() * 0.0003,
    size: 1.5 + Math.random(),
    alpha: 0.5 + Math.random() * 0.3,
  }));

  feedbackParticles = [];
  for (let i = 0; i < 5; i++) {
    feedbackParticles.push({
      t: i / 5,
      speed: 0.0003 + Math.random() * 0.0002,
      size: 2 + Math.random(),
      alpha: 0.4 + Math.random() * 0.4,
    });
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
}

function drawGroupFrame(x, y, w, h, label, accentColor, r) {
  r = r || 10;
  const rgb = hexToRgb(accentColor);
  roundRect(x, y, w, h, r);
  ctx.fillStyle = `rgba(${rgb}, 0.03)`;
  ctx.fill();
  ctx.strokeStyle = `rgba(${rgb}, 0.2)`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Accent left bar
  ctx.fillStyle = `rgba(${rgb}, 0.4)`;
  ctx.beginPath();
  ctx.roundRect(x, y + 8, 3, h - 16, 2);
  ctx.fill();

  // Label
  ctx.font = '700 9px -apple-system, system-ui, sans-serif';
  ctx.fillStyle = `rgba(${rgb}, 0.6)`;
  ctx.textAlign = 'left';
  ctx.fillText(label, x + 10, y + 14);
}

function drawOutputGroupFrame(x, y, w, h, label, accentColor, r) {
  r = r || 10;
  const rgb = hexToRgb(accentColor);
  roundRect(x, y, w, h, r);
  ctx.fillStyle = `rgba(${rgb}, 0.03)`;
  ctx.fill();
  ctx.strokeStyle = `rgba(${rgb}, 0.2)`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Accent right bar
  ctx.fillStyle = `rgba(${rgb}, 0.4)`;
  ctx.beginPath();
  ctx.roundRect(x + w - 3, y + 8, 3, h - 16, 2);
  ctx.fill();

  // Label
  ctx.font = '700 9px -apple-system, system-ui, sans-serif';
  ctx.fillStyle = `rgba(${rgb}, 0.6)`;
  ctx.textAlign = 'right';
  ctx.fillText(label, x + w - 10, y + 14);
}

function drawLibraryFrame() {
  const { libLeft, libRight, libW, libFrameTop, libFrameBot, libCX } = layout;
  const pad = 10;
  const fx = libLeft - pad;
  const fy = libFrameTop;
  const fw = libW + pad * 2;
  const fh = libFrameBot - libFrameTop;
  const rgb = hexToRgb(C.blue);

  // Outer glow
  const glow = ctx.createRadialGradient(fx + fw/2, fy + fh/2, 10, fx + fw/2, fy + fh/2, Math.max(fw, fh));
  glow.addColorStop(0, `rgba(${rgb}, 0.04)`);
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(fx - 60, fy - 60, fw + 120, fh + 120);

  // Container
  roundRect(fx, fy, fw, fh, 14);
  ctx.fillStyle = 'rgba(15, 23, 42, 0.55)';
  ctx.fill();
  ctx.strokeStyle = `rgba(${rgb}, 0.3)`;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Title
  ctx.font = '800 13px -apple-system, system-ui, sans-serif';
  ctx.fillStyle = `rgba(${rgb}, 0.85)`;
  ctx.textAlign = 'center';
  ctx.fillText('LIVING CONTENT LIBRARY', fx + fw/2, fy + 20);

  // Content Development Life Cycle — four phases with arrows
  const phases = [
    { label: 'GENERATE', color: C.violet },
    { label: 'EVALUATE', color: C.cyan },
    { label: 'DISTRIBUTE', color: C.emerald },
    { label: 'OBSERVE', color: C.amber },
  ];
  const phaseY = fy + 42;
  const phaseW = fw * 0.18;
  const phaseH = 20;
  const totalPhasesW = phases.length * phaseW + (phases.length - 1) * 24;
  const phaseStartX = fx + fw / 2 - totalPhasesW / 2;

  phases.forEach((p, i) => {
    const px = phaseStartX + i * (phaseW + 24);
    const prgb = hexToRgb(p.color);

    // Phase pill
    ctx.save();
    roundRect(px, phaseY, phaseW, phaseH, 5);
    ctx.fillStyle = `rgba(${prgb}, 0.1)`;
    ctx.fill();
    ctx.strokeStyle = `rgba(${prgb}, 0.3)`;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.font = '700 8px -apple-system, system-ui, sans-serif';
    ctx.fillStyle = `rgba(${prgb}, 0.8)`;
    ctx.textAlign = 'center';
    ctx.fillText(p.label, px + phaseW / 2, phaseY + 13);
    ctx.restore();

    // Arrow between phases
    if (i < phases.length - 1) {
      const arrowX1 = px + phaseW + 4;
      const arrowX2 = px + phaseW + 20;
      const arrowMidY = phaseY + phaseH / 2;
      ctx.beginPath();
      ctx.moveTo(arrowX1, arrowMidY);
      ctx.lineTo(arrowX2, arrowMidY);
      ctx.strokeStyle = 'rgba(148, 163, 184, 0.25)';
      ctx.lineWidth = 1;
      ctx.stroke();
      // Arrowhead
      ctx.beginPath();
      ctx.moveTo(arrowX2, arrowMidY);
      ctx.lineTo(arrowX2 - 4, arrowMidY - 3);
      ctx.lineTo(arrowX2 - 4, arrowMidY + 3);
      ctx.closePath();
      ctx.fillStyle = 'rgba(148, 163, 184, 0.25)';
      ctx.fill();
    }
  });

  // Return arrow from OBSERVE back to GENERATE (curved below the phases)
  const returnStartX = phaseStartX + 3 * (phaseW + 24) + phaseW + 4;
  const returnEndX = phaseStartX - 4;
  const returnY = phaseY + phaseH / 2;
  const returnBotY = phaseY + phaseH + 10;
  ctx.beginPath();
  ctx.moveTo(returnStartX, returnY);
  ctx.bezierCurveTo(
    returnStartX + 10, returnY,
    returnStartX + 10, returnBotY,
    fx + fw / 2, returnBotY
  );
  ctx.bezierCurveTo(
    returnEndX - 10, returnBotY,
    returnEndX - 10, returnY,
    returnEndX, returnY
  );
  ctx.strokeStyle = 'rgba(251, 191, 36, 0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  ctx.stroke();
  ctx.setLineDash([]);
  // Arrowhead pointing to GENERATE
  ctx.beginPath();
  ctx.moveTo(returnEndX, returnY);
  ctx.lineTo(returnEndX + 4, returnY - 3);
  ctx.lineTo(returnEndX + 4, returnY + 3);
  ctx.closePath();
  ctx.fillStyle = 'rgba(251, 191, 36, 0.25)';
  ctx.fill();

  // Badges positioned below trunk line, between atom nodes
  const { atomXPositions, libMidY } = layout;
  const tagH = 18;
  const tagY = libMidY + 28;

  // TOOL-AGNOSTIC — between Concepts (index 0) and Frameworks (index 1)
  ctx.save();
  ctx.font = '700 8px -apple-system, system-ui, sans-serif';
  const tagLeft = 'TOOL-AGNOSTIC';
  const tagLeftW = ctx.measureText(tagLeft).width + 14;
  const tagLeftCX = (atomXPositions[0] + atomXPositions[1]) / 2;
  const tagLeftX = tagLeftCX - tagLeftW / 2;
  roundRect(tagLeftX, tagY, tagLeftW, tagH, 4);
  ctx.fillStyle = `rgba(${rgb}, 0.08)`;
  ctx.fill();
  ctx.strokeStyle = `rgba(${rgb}, 0.25)`;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = `rgba(${rgb}, 0.7)`;
  ctx.textAlign = 'center';
  ctx.fillText(tagLeft, tagLeftCX, tagY + 12);
  ctx.restore();

  // COURSE-AGNOSTIC — between Evidence (index 2) and Signals (index 3)
  ctx.save();
  ctx.font = '700 8px -apple-system, system-ui, sans-serif';
  const tagRight = 'COURSE-AGNOSTIC';
  const tagRightW = ctx.measureText(tagRight).width + 14;
  const tagRightCX = (atomXPositions[2] + atomXPositions[3]) / 2;
  const tagRightX = tagRightCX - tagRightW / 2;
  roundRect(tagRightX, tagY, tagRightW, tagH, 4);
  ctx.fillStyle = `rgba(${rgb}, 0.08)`;
  ctx.fill();
  ctx.strokeStyle = `rgba(${rgb}, 0.25)`;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = `rgba(${rgb}, 0.7)`;
  ctx.textAlign = 'center';
  ctx.fillText(tagRight, tagRightCX, tagY + 12);
  ctx.restore();
}

function drawNode(node) {
  const isHov = hoveredNode && hoveredNode.id === node.id;
  const r = isHov ? node.r + 2 : node.r;
  const rgb = hexToRgb(node.color);

  if (isHov || node.type === 'library') {
    const glow = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, r * 3);
    glow.addColorStop(0, `rgba(${rgb}, ${isHov ? 0.3 : 0.12})`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(node.x, node.y, r * 3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.beginPath();
  ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${rgb}, ${isHov ? 0.4 : 0.15})`;
  ctx.fill();
  ctx.strokeStyle = `rgba(${rgb}, ${isHov ? 1 : 0.6})`;
  ctx.lineWidth = isHov ? 2 : 1.5;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(node.x, node.y, r * 0.35, 0, Math.PI * 2);
  ctx.fillStyle = node.color;
  ctx.fill();

  const labelColor = isHov ? node.color : 'rgba(226,232,240,0.85)';
  const subColor = isHov ? `rgba(${rgb},0.8)` : 'rgba(148,163,184,0.55)';

  if (node.type === 'source') {
    ctx.font = `${isHov ? '700' : '600'} 11px -apple-system, system-ui, sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillStyle = labelColor;
    ctx.fillText(node.label, node.x - r - 8, node.y + 1);
    ctx.font = '400 9px -apple-system, system-ui, sans-serif';
    ctx.fillStyle = subColor;
    ctx.fillText(node.sub, node.x - r - 8, node.y + 13);
  } else if (node.type === 'output') {
    ctx.font = `${isHov ? '700' : '600'} 11px -apple-system, system-ui, sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillStyle = labelColor;
    ctx.fillText(node.label, node.x + r + 8, node.y + 1);
    ctx.font = '400 9px -apple-system, system-ui, sans-serif';
    ctx.fillStyle = subColor;
    ctx.fillText(node.sub, node.x + r + 8, node.y + 13);
  } else {
    // Library nodes: label above, dot in middle, subtitle below
    ctx.font = `${isHov ? '700' : '600'} 11px -apple-system, system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = labelColor;
    ctx.fillText(node.label, node.x, node.y - r - 10);
    ctx.font = '400 9px -apple-system, system-ui, sans-serif';
    ctx.fillStyle = subColor;
    ctx.fillText(node.sub, node.x, node.y + r + 14);
  }
}

function drawParticle(x, y, size, color, alpha) {
  const rgb = hexToRgb(color);
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${rgb}, ${alpha})`;
  ctx.fill();
  const g = ctx.createRadialGradient(x, y, 0, x, y, size * 3.5);
  g.addColorStop(0, `rgba(${rgb}, ${alpha * 0.3})`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, size * 3.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawTrunkLine(x1, y1, x2, y2, color, width) {
  const rgb = hexToRgb(color);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = `rgba(${rgb}, 0.12)`;
  ctx.lineWidth = width || 2;
  ctx.stroke();
}

function drawBranchLine(x1, y1, x2, y2, color) {
  const rgb = hexToRgb(color);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  const midX = (x1 + x2) / 2;
  ctx.bezierCurveTo(midX, y1, midX, y2, x2, y2);
  ctx.strokeStyle = `rgba(${rgb}, 0.08)`;
  ctx.lineWidth = 1;
  ctx.stroke();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const L = layout;
  const srcNodes = allNodes.filter(n => n.type === 'source');
  const outNodes = allNodes.filter(n => n.type === 'output');
  const libNodes = allNodes.filter(n => n.type === 'library');

  // -- Source group frames --
  drawGroupFrame(L.srcColX, L.intTop, L.srcColW, L.intBot - L.intTop, 'INTERNAL', C.cyan);
  drawGroupFrame(L.srcColX, L.extTop, L.srcColW, L.extBot - L.extTop, 'EXTERNAL', C.violet);

  // -- Output group frames --
  drawOutputGroupFrame(L.outColX, L.certTop, L.outColW, L.certBot - L.certTop, 'CERTIFICATIONS', C.emerald);
  drawOutputGroupFrame(L.outColX, L.entTop, L.outColW, L.entBot - L.entTop, 'ENTERPRISE', C.orange);
  drawOutputGroupFrame(L.outColX, L.tlTop, L.outColW, L.tlBot - L.tlTop, 'THOUGHT LEADERSHIP', C.pink);

  // -- Library frame --
  drawLibraryFrame();

  // -- Trunk lines --
  // Convergence point (left of library)
  const convX = L.trunkInX + 5;
  const convY = L.trunkMidY;
  // Fan-out point (right of library)
  const fanX = L.trunkOutX - 5;
  const fanY = L.trunkMidY;

  // Source branches → convergence point
  srcNodes.forEach(n => {
    drawBranchLine(n.x, n.y, convX, convY, n.color);
  });

  // Trunk: convergence → library center
  drawTrunkLine(convX, convY, L.libCX, convY, C.blue, 2.5);

  // Trunk: library center → fan-out
  drawTrunkLine(L.libCX, fanY, fanX, fanY, C.blue, 2.5);

  // Fan-out → output branches
  outNodes.forEach(n => {
    drawBranchLine(fanX, fanY, n.x, n.y, n.color);
  });

  // -- Feedback loop (outputs → below library → back to entry) --
  const fbStartX = fanX;
  const fbStartY = fanY;
  const fbEndX = convX;
  const fbEndY = convY;
  const fbBotY = L.libFrameBot + 40;

  ctx.beginPath();
  ctx.moveTo(fbStartX, fbStartY);
  ctx.bezierCurveTo(
    fbStartX + 30, fbStartY,
    fbStartX + 30, fbBotY,
    L.libCX, fbBotY
  );
  ctx.bezierCurveTo(
    fbEndX - 30, fbBotY,
    fbEndX - 30, fbEndY,
    fbEndX, fbEndY
  );
  ctx.strokeStyle = `rgba(${hexToRgb(C.amber)}, 0.18)`;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 5]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Feedback label — centered under the library title
  ctx.font = '700 9px -apple-system, system-ui, sans-serif';
  ctx.fillStyle = `rgba(${hexToRgb(C.amber)}, 0.6)`;
  ctx.textAlign = 'center';
  ctx.fillText('CONTINUOUS FEEDBACK LOOP', L.libCX, fbBotY + 14);
  ctx.font = '400 9px -apple-system, system-ui, sans-serif';
  ctx.fillStyle = `rgba(${hexToRgb(C.amber)}, 0.35)`;
  ctx.fillText('Outputs generate signal that enriches the library', L.libCX, fbBotY + 26);

  // -- Particles on source branches --
  srcNodes.forEach((n, i) => {
    const p = sourceLineParticles[i];
    if (!p) return;
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;
    const t = p.t;
    const midX = (n.x + convX) / 2;
    const bx = (1-t)*(1-t)*(1-t)*n.x + 3*(1-t)*(1-t)*t*midX + 3*(1-t)*t*t*midX + t*t*t*convX;
    const by = (1-t)*(1-t)*(1-t)*n.y + 3*(1-t)*(1-t)*t*n.y + 3*(1-t)*t*t*convY + t*t*t*convY;
    drawParticle(bx, by, p.size, n.color, p.alpha * (0.4 + 0.6 * Math.sin(t * Math.PI)));
  });

  // -- Particles on input trunk --
  inTrunkParticles.forEach(p => {
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;
    const x = convX + (L.libCX - convX) * p.t;
    drawParticle(x, convY, p.size, C.blue, p.alpha * (0.3 + 0.7 * Math.sin(p.t * Math.PI)));
  });

  // -- Particles on output trunk --
  outTrunkParticles.forEach(p => {
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;
    const x = L.libCX + (fanX - L.libCX) * p.t;
    drawParticle(x, fanY, p.size, C.blue, p.alpha * (0.3 + 0.7 * Math.sin(p.t * Math.PI)));
  });

  // -- Particles on output branches --
  outNodes.forEach((n, i) => {
    const p = outputLineParticles[i];
    if (!p) return;
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;
    const t = p.t;
    const midX = (fanX + n.x) / 2;
    const bx = (1-t)*(1-t)*(1-t)*fanX + 3*(1-t)*(1-t)*t*midX + 3*(1-t)*t*t*midX + t*t*t*n.x;
    const by = (1-t)*(1-t)*(1-t)*fanY + 3*(1-t)*(1-t)*t*fanY + 3*(1-t)*t*t*n.y + t*t*t*n.y;
    drawParticle(bx, by, p.size, n.color, p.alpha * (0.4 + 0.6 * Math.sin(t * Math.PI)));
  });

  // -- Feedback particles (follow the two-segment bezier path) --
  feedbackParticles.forEach(p => {
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;
    const t = p.t;
    let px, py;
    if (t < 0.5) {
      const lt = t * 2;
      const p0x = fbStartX, p0y = fbStartY;
      const p1x = fbStartX + 30, p1y = fbStartY;
      const p2x = fbStartX + 30, p2y = fbBotY;
      const p3x = L.libCX, p3y = fbBotY;
      px = (1-lt)**3*p0x + 3*(1-lt)**2*lt*p1x + 3*(1-lt)*lt**2*p2x + lt**3*p3x;
      py = (1-lt)**3*p0y + 3*(1-lt)**2*lt*p1y + 3*(1-lt)*lt**2*p2y + lt**3*p3y;
    } else {
      const lt = (t - 0.5) * 2;
      const p0x = L.libCX, p0y = fbBotY;
      const p1x = fbEndX - 30, p1y = fbBotY;
      const p2x = fbEndX - 30, p2y = fbEndY;
      const p3x = fbEndX, p3y = fbEndY;
      px = (1-lt)**3*p0x + 3*(1-lt)**2*lt*p1x + 3*(1-lt)*lt**2*p2x + lt**3*p3x;
      py = (1-lt)**3*p0y + 3*(1-lt)**2*lt*p1y + 3*(1-lt)*lt**2*p2y + lt**3*p3y;
    }
    drawParticle(px, py, p.size, C.amber, p.alpha * (0.3 + 0.5 * Math.sin(t * Math.PI * 2)));
  });

  // -- Draw nodes --
  allNodes.forEach(n => drawNode(n));

  requestAnimationFrame(draw);
}

// Interaction
function getNodeAt(mx, my) {
  for (let i = allNodes.length - 1; i >= 0; i--) {
    const n = allNodes[i];
    if (Math.sqrt((mx - n.x) ** 2 + (my - n.y) ** 2) < n.r + 14) return n;
  }
  return null;
}

const tip = document.getElementById('hoverTip');
const htLabel = document.getElementById('htLabel');
const htSub = document.getElementById('htSub');

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const node = getNodeAt(e.clientX - rect.left, e.clientY - rect.top);
  if (node) {
    hoveredNode = node;
    canvas.style.cursor = 'pointer';
    htLabel.textContent = node.label;
    htSub.textContent = 'Click to explore';
    tip.classList.add('visible');
    const tx = e.clientX + 16;
    tip.style.left = (tx + tip.offsetWidth > window.innerWidth ? e.clientX - tip.offsetWidth - 8 : tx) + 'px';
    tip.style.top = (e.clientY - 10) + 'px';
  } else {
    hoveredNode = null;
    canvas.style.cursor = 'default';
    tip.classList.remove('visible');
  }
});

canvas.addEventListener('mouseleave', () => { hoveredNode = null; tip.classList.remove('visible'); });

const panel = document.getElementById('detailPanel');
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const node = getNodeAt(e.clientX - rect.left, e.clientY - rect.top);
  if (node) {
    let cat = '';
    if (node.type === 'source') cat = node.group === 'internal' ? 'Internal Source' : 'External Source';
    else if (node.type === 'library') cat = 'Content Atom Type';
    else cat = node.group === 'certifications' ? 'Certifications' : node.group === 'enterprise' ? 'Enterprise Output' : 'Thought Leadership';

    document.getElementById('dpCategory').textContent = cat;
    document.getElementById('dpCategory').style.color = node.color;
    document.getElementById('dpTitle').textContent = node.label;
    document.getElementById('dpDesc').textContent = node.desc;

    const meta = document.getElementById('dpMeta');
    meta.innerHTML = '';
    (node.tags || []).forEach(tag => {
      const el = document.createElement('span');
      el.className = 'dp-tag';
      el.textContent = tag;
      el.style.background = `rgba(${hexToRgb(node.color)}, 0.15)`;
      el.style.color = node.color;
      meta.appendChild(el);
    });
    panel.classList.add('open');
    tip.classList.remove('visible');
  }
});

document.getElementById('closePanel').addEventListener('click', () => panel.classList.remove('open'));
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') panel.classList.remove('open'); });

window.addEventListener('resize', resize);
resize();
draw();
</script>
</body>
