<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product School — Living Content Library System</title>

    --cyan: #22d3ee;
    --blue: #3b82f6;

    --amber: #fbbf24;

    --orange: #fb923c;

  body {
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;

    padding: 28px 24px 12px;

    letter-spacing: -0.3px;
    color: var(--text);

    -webkit-text-fill-color: transparent;
  }

  header p {
    font-size: 12px;

  }

  .canvas-wrap {
    flex: 1;
    position: relative;
    min-height: 0;
  }

  canvas#flowCanvas {

    width: 100%;
    height: 100%;
  }

  /* Detail panel */
  .detail-panel {
    position: fixed;
    right: -400px;
    top: 0;

    height: 100vh;
    background: var(--surface-solid);
    border-left: 1px solid var(--border);

    overflow-y: auto;
  }

    top: 16px;

    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px;

    cursor: pointer;

    display: flex;
    align-items: center;

let hoveredNode = null;

  H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

let nodes = [];
let connections = [];
let particles = [];
let feedbackParticles = [];
let feedbackPath = [];

function layoutNodes() {
  const pad = 40;
  const leftX = pad + 100;
  const rightX = W - pad - 100;
  const centerX = W / 2;
  const topY = 30;
  const bottomY = H - 50;

  const srcSpacing = Math.min(48, (bottomY - topY - 40) / (sources.length - 1));
  const srcStartY = topY + (bottomY - topY - srcSpacing * (sources.length - 1)) / 2;

  const outSpacing = Math.min(52, (bottomY - topY - 40) / (outputs.length - 1));
  const outStartY = topY + (bottomY - topY - outSpacing * (outputs.length - 1)) / 2;

  const libSpacing = 64;
  const libStartY = (topY + bottomY) / 2 - (libSpacing * (libraryNodes.length - 1)) / 2;

  nodes = [];

  sources.forEach((s, i) => {
    nodes.push({ ...s, x: leftX, y: srcStartY + i * srcSpacing, r: 8, type: 'source' });
  });

  libraryNodes.forEach((l, i) => {
    nodes.push({ ...l, x: centerX, y: libStartY + i * libSpacing, r: 14, type: 'library' });
  });

  outputs.forEach((o, i) => {
    nodes.push({ ...o, x: rightX, y: outStartY + i * outSpacing, r: 8, type: 'output' });
  });

  connections = [];
  const srcNodes = nodes.filter(n => n.type === 'source');
  const libNodes = nodes.filter(n => n.type === 'library');
  const outNodes = nodes.filter(n => n.type === 'output');

  srcNodes.forEach(s => {
    const target = libNodes[Math.floor(Math.random() * libNodes.length)];
    connections.push({ from: s, to: target, type: 'in' });
  });

  outNodes.forEach(o => {
    const source = libNodes[Math.floor(Math.random() * libNodes.length)];
    connections.push({ from: source, to: o, type: 'out' });
  });

  // Feedback loop: sweeps from outputs down, across bottom, and back up to sources
  const fbY = bottomY + 25;
  feedbackPath = [
    { x: rightX, y: outStartY + (outputs.length - 1) * outSpacing },
    { x: rightX + 50, y: fbY },
    { x: W * 0.65, y: fbY + 20 },
    { x: centerX, y: fbY + 25 },
    { x: W * 0.35, y: fbY + 20 },
    { x: leftX - 50, y: fbY },
    { x: leftX, y: srcStartY + (sources.length - 1) * srcSpacing },
  ];

  initParticles();
}

function initParticles() {
  particles = [];
  connections.forEach((conn, ci) => {
    const count = 2 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      particles.push({
        conn: ci,
        t: Math.random(),
        speed: 0.0004 + Math.random() * 0.0006,
        size: 1.5 + Math.random() * 1.5,
        alpha: 0.4 + Math.random() * 0.5,
      });
    }
  });

  feedbackParticles = [];
  for (let i = 0; i < 6; i++) {
    feedbackParticles.push({
      t: i / 6,
      speed: 0.0003 + Math.random() * 0.0004,
      size: 2 + Math.random() * 1.5,
      alpha: 0.5 + Math.random() * 0.4,
    });
  }
}

function lerp(a, b, t) { return a + (b - a) * t; }

function catmullRom(pts, t) {
  const n = pts.length - 1;
  const seg = Math.min(Math.floor(t * n), n - 1);
  const lt = (t * n) - seg;

  const p0 = pts[Math.max(seg - 1, 0)];
  const p1 = pts[seg];
  const p2 = pts[Math.min(seg + 1, n)];
  const p3 = pts[Math.min(seg + 2, n)];

  const t2 = lt * lt;
  const t3 = t2 * lt;

  return {
    x: 0.5 * ((2*p1.x) + (-p0.x+p2.x)*lt + (2*p0.x-5*p1.x+4*p2.x-p3.x)*t2 + (-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y: 0.5 * ((2*p1.y) + (-p0.y+p2.y)*lt + (2*p0.y-5*p1.y+4*p2.y-p3.y)*t2 + (-p0.y+3*p1.y-3*p2.y+p3.y)*t3),
  };
}

function getConnectionPoint(conn, t) {
  const f = conn.from;
  const to = conn.to;
  const midX = (f.x + to.x) / 2;
  const pts = [
    { x: f.x, y: f.y },
    { x: midX, y: f.y + (to.y - f.y) * 0.15 },
    { x: midX, y: to.y - (to.y - f.y) * 0.15 },
    { x: to.x, y: to.y },
  ];
  return catmullRom(pts, t);
}

function getFeedbackPoint(t) {
  return catmullRom(feedbackPath, t);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `${r},${g},${b}`;
}

function drawConnection(conn, alpha) {
  const steps = 40;
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const p = getConnectionPoint(conn, i / steps);
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
  const color = conn.type === 'in' ? COLORS.cyan : COLORS.emerald;
  ctx.strokeStyle = `rgba(${hexToRgb(color)}, ${0.06 * alpha})`;
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawFeedbackCurve() {
  const steps = 60;
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const p = getFeedbackPoint(i / steps);
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
  ctx.strokeStyle = `rgba(${hexToRgb(COLORS.amber)}, 0.12)`;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrow heads at both ends
  const startP = getFeedbackPoint(0.01);
  const endP = getFeedbackPoint(0.99);
  
  // Label at the bottom center
  const mid = getFeedbackPoint(0.5);
  ctx.font = '700 10px -apple-system, system-ui, sans-serif';
  ctx.fillStyle = `rgba(${hexToRgb(COLORS.amber)}, 0.7)`;
  ctx.textAlign = 'center';
  ctx.fillText('CONTINUOUS FEEDBACK LOOP', mid.x, mid.y + 22);
  ctx.font = '400 10px -apple-system, system-ui, sans-serif';
  ctx.fillStyle = `rgba(${hexToRgb(COLORS.amber)}, 0.45)`;
  ctx.fillText('Outputs generate signal that flows back and enriches sources', mid.x, mid.y + 36);
}

function drawNode(node) {
  const isHovered = hoveredNode && hoveredNode.id === node.id;
  const r = isHovered ? node.r + 3 : node.r;
  const rgb = hexToRgb(node.color);

  // Glow
  if (isHovered || node.type === 'library') {
    const glow = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, r * 3);
    glow.addColorStop(0, `rgba(${rgb}, ${isHovered ? 0.25 : 0.1})`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(node.x, node.y, r * 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Node body
  ctx.beginPath();
  ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${rgb}, ${isHovered ? 0.35 : 0.15})`;
  ctx.fill();
  ctx.strokeStyle = `rgba(${rgb}, ${isHovered ? 1 : 0.6})`;
  ctx.lineWidth = isHovered ? 2 : 1.5;
  ctx.stroke();

  // Inner dot
  ctx.beginPath();
  ctx.arc(node.x, node.y, r * 0.35, 0, Math.PI * 2);
  ctx.fillStyle = node.color;
  ctx.fill();

  // Label
  ctx.font = `${isHovered ? '700' : '600'} 11px -apple-system, system-ui, sans-serif`;
  ctx.fillStyle = isHovered ? node.color : `rgba(${hexToRgb(COLORS.blue)}, 0)`;

  if (node.type === 'source') {
    ctx.textAlign = 'right';
    ctx.fillStyle = isHovered ? node.color : 'rgba(226,232,240,0.85)';
    ctx.fillText(node.label, node.x - r - 10, node.y + 1);
    ctx.font = '400 9px -apple-system, system-ui, sans-serif';
    ctx.fillStyle = isHovered ? `rgba(${rgb}, 0.8)` : 'rgba(148,163,184,0.6)';
    ctx.fillText(node.sub, node.x - r - 10, node.y + 13);
  } else if (node.type === 'output') {
    ctx.textAlign = 'left';
    ctx.fillStyle = isHovered ? node.color : 'rgba(226,232,240,0.85)';
    ctx.fillText(node.label, node.x + r + 10, node.y + 1);
    ctx.font = '400 9px -apple-system, system-ui, sans-serif';
    ctx.fillStyle = isHovered ? `rgba(${rgb}, 0.8)` : 'rgba(148,163,184,0.6)';
    ctx.fillText(node.sub, node.x + r + 10, node.y + 13);
  } else {
    ctx.textAlign = 'center';
    ctx.fillStyle = isHovered ? node.color : 'rgba(226,232,240,0.9)';
    ctx.font = `${isHovered ? '700' : '600'} 12px -apple-system, system-ui, sans-serif`;
    ctx.fillText(node.label, node.x, node.y - r - 10);
    ctx.font = '400 10px -apple-system, system-ui, sans-serif';
    ctx.fillStyle = isHovered ? `rgba(${rgb}, 0.8)` : 'rgba(148,163,184,0.7)';
    ctx.fillText(node.sub, node.x, node.y - r + 2);
  }
}

function drawLibraryFrame() {
  const libNodes = nodes.filter(n => n.type === 'library');
  if (!libNodes.length) return;

  const cx = libNodes[0].x;
  const topY = Math.min(...libNodes.map(n => n.y));
  const botY = Math.max(...libNodes.map(n => n.y));
  const padX = 90;
  const padTop = 70;
  const padBot = 50;

  const fx = cx - padX;
  const fy = topY - padTop;
  const fw = padX * 2;
  const fh = (botY - topY) + padTop + padBot;
  const r = 16;

  // Outer glow
  const glow = ctx.createRadialGradient(cx, topY + (botY - topY) / 2, 10, cx, topY + (botY - topY) / 2, Math.max(fw, fh));
  glow.addColorStop(0, 'rgba(59, 130, 246, 0.06)');
  glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(fx - 60, fy - 60, fw + 120, fh + 120);

  // Container background
  ctx.beginPath();
  ctx.roundRect(fx, fy, fw, fh, r);
  ctx.fillStyle = 'rgba(15, 23, 42, 0.5)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(59, 130, 246, 0.25)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Subtle inner border for depth
  ctx.beginPath();
  ctx.roundRect(fx + 1, fy + 1, fw - 2, fh - 2, r - 1);
  ctx.strokeStyle = 'rgba(59, 130, 246, 0.06)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Title
  ctx.font = '800 13px -apple-system, system-ui, sans-serif';
  ctx.fillStyle = 'rgba(59, 130, 246, 0.8)';
  ctx.textAlign = 'center';
  ctx.fillText('LIVING CONTENT LIBRARY', cx, fy + 24);

  // Subtitle
  ctx.font = '400 10px -apple-system, system-ui, sans-serif';
  ctx.fillStyle = 'rgba(148, 163, 184, 0.6)';
  ctx.fillText('Curate \u00b7 Verify \u00b7 Compound', cx, fy + 40);

  // Tool-agnostic badge
  const badgeText = 'TOOL-AGNOSTIC';
  ctx.font = '700 9px -apple-system, system-ui, sans-serif';
  const bw = ctx.measureText(badgeText).width + 16;
  const bh = 20;
  const bx = cx - bw / 2;
  const by = botY + 24;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 4);
  ctx.fillStyle = 'rgba(59, 130, 246, 0.1)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(59, 130, 246, 0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = 'rgba(59, 130, 246, 0.8)';
  ctx.textAlign = 'center';
  ctx.fillText(badgeText, cx, by + 13.5);

  // Course-agnostic badge below
  const badge2Text = 'COURSE-AGNOSTIC';
  ctx.font = '700 9px -apple-system, system-ui, sans-serif';
  const b2w = ctx.measureText(badge2Text).width + 16;
  const b2x = cx - b2w / 2;
  const b2y = by + bh + 6;
  ctx.beginPath();
  ctx.roundRect(b2x, b2y, b2w, bh, 4);
  ctx.fillStyle = 'rgba(59, 130, 246, 0.1)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(59, 130, 246, 0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = 'rgba(59, 130, 246, 0.8)';
  ctx.textAlign = 'center';
  ctx.fillText(badge2Text, cx, b2y + 13.5);
}

function drawColumnLabels() {
  const srcNodes = nodes.filter(n => n.type === 'source');
  const outNodes = nodes.filter(n => n.type === 'output');

  ctx.font = '700 10px -apple-system, system-ui, sans-serif';
  ctx.textAlign = 'center';

  if (srcNodes.length) {
    ctx.fillStyle = `rgba(${hexToRgb(COLORS.cyan)}, 0.5)`;
    ctx.fillText('SIGNAL SOURCES', srcNodes[0].x, srcNodes[0].y - 36);
  }

  if (outNodes.length) {
    ctx.fillStyle = `rgba(${hexToRgb(COLORS.emerald)}, 0.5)`;
    ctx.fillText('CONTENT OUTPUTS', outNodes[0].x, outNodes[0].y - 36);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Library container frame (behind everything)
  drawLibraryFrame();

  // Connections
  connections.forEach(c => drawConnection(c, 1));

  // Feedback curve
  drawFeedbackCurve();

  // Particles on connections
  particles.forEach(p => {
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;
    const conn = connections[p.conn];
    const pos = getConnectionPoint(conn, p.t);
    const color = conn.type === 'in' ? COLORS.cyan : COLORS.emerald;
    const rgb = hexToRgb(color);

    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${rgb}, ${p.alpha * (0.5 + 0.5 * Math.sin(p.t * Math.PI * 2))})`;
    ctx.fill();

    // Particle glow
    const pg = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, p.size * 4);
    pg.addColorStop(0, `rgba(${rgb}, 0.15)`);
    pg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size * 4, 0, Math.PI * 2);
    ctx.fill();
  });

  // Feedback particles
  feedbackParticles.forEach(p => {
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;
    const pos = getFeedbackPoint(p.t);
    const rgb = hexToRgb(COLORS.amber);

    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${rgb}, ${p.alpha * (0.5 + 0.5 * Math.sin(p.t * Math.PI * 4))})`;
    ctx.fill();

    const pg = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, p.size * 3);
    pg.addColorStop(0, `rgba(${rgb}, 0.2)`);
    pg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size * 3, 0, Math.PI * 2);
    ctx.fill();
  });

  // Column labels
  drawColumnLabels();

  // Nodes
  nodes.forEach(n => drawNode(n));

  animFrame = requestAnimationFrame(draw);
}

// Interaction
function getNodeAt(mx, my) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const d = Math.sqrt((mx - n.x) ** 2 + (my - n.y) ** 2);
    if (d < n.r + 12) return n;
  }
  return null;
}

const tip = document.getElementById('hoverTip');
const htLabel = document.getElementById('htLabel');
const htSub = document.getElementById('htSub');

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const node = getNodeAt(mx, my);

  if (node) {
    hoveredNode = node;
    canvas.style.cursor = 'pointer';
    htLabel.textContent = node.label;
    htSub.textContent = 'Click to explore';
    tip.classList.add('visible');
    const tx = e.clientX + 16;
    const ty = e.clientY - 10;
    tip.style.left = (tx + tip.offsetWidth > window.innerWidth ? e.clientX - tip.offsetWidth - 8 : tx) + 'px';
    tip.style.top = ty + 'px';
  } else {
    hoveredNode = null;
    canvas.style.cursor = 'default';
    tip.classList.remove('visible');
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredNode = null;
  tip.classList.remove('visible');
});

const panel = document.getElementById('detailPanel');
const dpCat = document.getElementById('dpCategory');
const dpTitle = document.getElementById('dpTitle');
const dpDesc = document.getElementById('dpDesc');
const dpMeta = document.getElementById('dpMeta');

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const node = getNodeAt(mx, my);

  if (node) {
    let catLabel = '';
    let catColor = node.color;
    if (node.type === 'source') catLabel = node.cat === 'internal' ? 'Internal Source' : 'External Source';
    else if (node.type === 'library') catLabel = 'Content Atom Type';
    else {
      catLabel = node.cat === 'courses' ? 'Certifications' : node.cat === 'enterprise' ? 'Enterprise Output' : 'Thought Leadership';
    }

    dpCat.textContent = catLabel;
    dpCat.style.color = node.color;
    dpTitle.textContent = node.label;
    dpDesc.textContent = node.desc;

    dpMeta.innerHTML = '';
    if (node.tags) {
      node.tags.forEach(tag => {
        const el = document.createElement('span');
        el.className = 'dp-tag';
        el.textContent = tag;
        el.style.background = `rgba(${hexToRgb(node.color)}, 0.15)`;
        el.style.color = node.color;
        dpMeta.appendChild(el);
      });
    }

    panel.classList.add('open');
    tip.classList.remove('visible');
  }
});

document.getElementById('closePanel').addEventListener('click', () => {
  panel.classList.remove('open');
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') panel.classList.remove('open');
});

window.addEventListener('resize', resize);
resize();
draw();
</script>
